<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #f4f7fb 0%, #e8eef8 100%);
            color: #1f2937;
        }

        .page {
            max-width: 980px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
        }

        .panel {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        p {
            line-height: 1.7;
            color: #4b5563;
        }

        .menu-list {
            display: grid;
            gap: 12px;
        }

        .menu-item {
            display: block;
            text-decoration: none;
            color: #1f2937;
            padding: 14px 16px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .menu-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .menu-item span {
            font-size: 14px;
            color: #64748b;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 16px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
        }

        .result-card {
            margin-top: 28px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .hint {
            margin-top: 18px;
            font-size: 14px;
            color: #64748b;
        }

        .recommend {
            margin-top: 16px;
            padding: 14px 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
        }

        .recommend a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 860px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="layout">
            <aside class="panel">
                <h2>学习菜单</h2>
                <p>你可以直接点菜单看对应知识内容，也可以先提问，再根据推荐继续查看。</p>
                <nav class="menu-list">
                    {% for menu in menus %}
                    <a class="menu-item" href="{{ menu.url }}">
                        <strong>{{ menu.title }}</strong>
                        <span>{{ menu.description }}</span>
                    </a>
                    {% endfor %}
                </nav>
            </aside>

            <section class="panel">
                <h1>多知识库问答 Web 项目</h1>
                <p>当前版本已经支持页面问答、混合检索，以及回答后的菜单推荐。</p>

                <div class="form">
                    <textarea id="questionInput" placeholder="例如：RAG 的基本流程是什么？"></textarea>
                    <button id="askButton" type="button">提交问题</button>
                </div>

                <div id="result" style="display:none;">
                    <div class="result-card">
                        <h3>回答结果</h3>
                        <div id="answerBox" style="line-height: 1.8;"></div>
                        <div id="sourceBox" style="margin-top: 14px; font-size: 14px; color: #475569;"></div>
                        <div id="recommendBox" class="recommend" style="display:none;"></div>
                    </div>
                </div>

                <p id="hint" class="hint">现在你可以直接提问，系统会在回答后推荐你继续查看的菜单。</p>
            </section>
        </div>
    </main>
    <script>
        const button = document.getElementById("askButton");
        const input = document.getElementById("questionInput");
        const result = document.getElementById("result");
        const answerBox = document.getElementById("answerBox");
        const sourceBox = document.getElementById("sourceBox");
        const recommendBox = document.getElementById("recommendBox");
        const hint = document.getElementById("hint");

        button.addEventListener("click", async () => {
            const question = input.value.trim();
            if (!question) {
                hint.textContent = "请输入问题后再提交。";
                return;
            }

            button.disabled = true;
            button.textContent = "思考中...";
            hint.textContent = "正在请求后端问答接口...";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                answerBox.textContent = data.answer;
                sourceBox.textContent = data.sources.length
                    ? `来源文件：${data.sources.join("、")}`
                    : "没有返回来源文件。";

                if (data.recommended_menu) {
                    recommendBox.style.display = "block";
                    recommendBox.innerHTML = `推荐继续查看：<a href="${data.recommended_menu.url}">${data.recommended_menu.title}</a>`;
                } else {
                    recommendBox.style.display = "none";
                    recommendBox.innerHTML = "";
                }

                result.style.display = "block";
                hint.textContent = "问答完成。";
            } catch (error) {
                hint.textContent = "请求失败，请稍后重试。";
            } finally {
                button.disabled = false;
                button.textContent = "提交问题";
            }
        });
    </script>
</body>
</html>
