<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #f4f7fb 0%, #e8eef8 100%);
            color: #1f2937;
        }

        .page {
            max-width: 1180px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        .panel {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        p {
            line-height: 1.7;
            color: #4b5563;
        }

        .menu-list {
            display: grid;
            gap: 12px;
        }

        .menu-item {
            display: block;
            text-decoration: none;
            color: #1f2937;
            padding: 14px 16px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .menu-item strong {
            display: block;
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 16px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
        }

        .result-card {
            margin-top: 28px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .hint {
            margin-top: 18px;
            font-size: 14px;
            color: #64748b;
        }

        .recommend {
            margin-top: 16px;
            padding: 14px 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
        }

        .recommend a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }

        .diagnostics-grid {
            display: grid;
            gap: 16px;
            margin-top: 18px;
        }

        .diag-block {
            padding: 14px 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .chunk {
            margin-top: 10px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .chunk-title {
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            margin: 0;
            font-family: "Cascadia Mono", "Consolas", monospace;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .status.ok {
            background: #dcfce7;
            color: #166534;
        }

        .status.reject {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="layout">
            <aside class="panel">
                <h2>学习菜单</h2>
                <p>这里的菜单不是为了好看，而是为了帮助你把回答结果和知识来源对应起来。</p>
                <nav class="menu-list">
                    {% for menu in menus %}
                    <div class="menu-item">
                        <strong>{{ menu.title }}</strong>
                        <div>对应 URL：{{ menu.url }}</div>
                        <div>对应文件：{{ menu.source }}</div>
                    </div>
                    {% endfor %}
                </nav>
            </aside>

            <section class="panel">
                <h1>RAG Diagnostics Web</h1>
                <p>这个页面专门把 RAG 的内部过程展示出来，让你能看懂“为什么这样回答”。</p>

                <textarea id="questionInput" placeholder="例如：什么是 RAG？"></textarea>
                <button id="askButton" type="button">提交问题</button>
                <p id="hint" class="hint">先问一个相关问题，再问一个明显无关的问题，对比两次诊断结果。</p>

                <div id="result" style="display:none;">
                    <div class="result-card">
                        <h2>回答结果</h2>
                        <div id="answerBox" style="line-height: 1.8;"></div>
                        <div id="sourceBox" style="margin-top: 12px; color: #475569;"></div>
                        <div id="statusBox" style="margin-top: 12px;"></div>

                        <div id="recommendBox" class="recommend" style="display:none;">
                            <div id="recommendLink"></div>
                            <div id="recommendReason" style="margin-top: 8px; color: #475569;"></div>
                        </div>

                        <div class="diagnostics-grid">
                            <div class="diag-block">
                                <h3>诊断摘要</h3>
                                <div id="diagnosticsSummary"></div>
                            </div>

                            <div class="diag-block">
                                <h3>BM25 检索结果</h3>
                                <div id="bm25Box"></div>
                            </div>

                            <div class="diag-block">
                                <h3>向量检索结果</h3>
                                <div id="vectorBox"></div>
                            </div>

                            <div class="diag-block">
                                <h3>融合结果</h3>
                                <div id="fusedBox"></div>
                            </div>

                            <div class="diag-block">
                                <h3>最终送给模型的上下文</h3>
                                <pre id="contextBox"></pre>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script>
        const button = document.getElementById("askButton");
        const input = document.getElementById("questionInput");
        const hint = document.getElementById("hint");
        const result = document.getElementById("result");
        const answerBox = document.getElementById("answerBox");
        const sourceBox = document.getElementById("sourceBox");
        const statusBox = document.getElementById("statusBox");
        const recommendBox = document.getElementById("recommendBox");
        const recommendLink = document.getElementById("recommendLink");
        const recommendReason = document.getElementById("recommendReason");
        const diagnosticsSummary = document.getElementById("diagnosticsSummary");
        const bm25Box = document.getElementById("bm25Box");
        const vectorBox = document.getElementById("vectorBox");
        const fusedBox = document.getElementById("fusedBox");
        const contextBox = document.getElementById("contextBox");

        function renderChunks(container, items) {
            if (!items.length) {
                container.innerHTML = "<p>没有结果。</p>";
                return;
            }

            container.innerHTML = items.map((item, index) => `
                <div class="chunk">
                    <div class="chunk-title">第 ${index + 1} 个片段 | 来源：${item.source} | 分数：${item.score.toFixed(4)}</div>
                    <pre>${item.content}</pre>
                </div>
            `).join("");
        }

        button.addEventListener("click", async () => {
            const question = input.value.trim();
            if (!question) {
                hint.textContent = "请输入问题后再提交。";
                return;
            }

            button.disabled = true;
            button.textContent = "分析中...";
            hint.textContent = "正在执行检索、融合和回答...";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                answerBox.textContent = data.answer;
                sourceBox.textContent = data.sources.length
                    ? `来源文件：${data.sources.join("、")}`
                    : "没有命中来源文件。";

                const rejected = data.diagnostics.rejected;
                statusBox.innerHTML = rejected
                    ? '<span class="status reject">已触发拒答</span>'
                    : '<span class="status ok">正常回答</span>';

                if (data.recommended_menu) {
                    recommendBox.style.display = "block";
                    recommendLink.innerHTML = `推荐继续查看：<strong>${data.recommended_menu.title}</strong>（${data.recommended_menu.url}）`;
                    recommendReason.textContent = data.recommended_reason || "";
                } else {
                    recommendBox.style.display = "none";
                    recommendLink.innerHTML = "";
                    recommendReason.textContent = "";
                }

                diagnosticsSummary.innerHTML = `
                    <div>最高融合分：${data.diagnostics.best_score.toFixed(4)}</div>
                    <div>拒答阈值：${data.diagnostics.threshold.toFixed(2)}</div>
                    <div>是否拒答：${data.diagnostics.rejected ? "是" : "否"}</div>
                `;

                renderChunks(bm25Box, data.diagnostics.bm25_results);
                renderChunks(vectorBox, data.diagnostics.vector_results);
                renderChunks(fusedBox, data.diagnostics.fused_results);
                contextBox.textContent = data.diagnostics.final_context;

                result.style.display = "block";
                hint.textContent = "分析完成。";
            } catch (error) {
                hint.textContent = "请求失败，请稍后重试。";
            } finally {
                button.disabled = false;
                button.textContent = "提交问题";
            }
        });
    </script>
</body>
</html>
